app-id: io.github.CharanMunur.Clippy
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: clippy
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  # Required to write to ~/.config/autostart
  - --filesystem=xdg-config/autostart:create
  # Required to read/write GSettings and dconf keys on the host
  - --talk-name=ca.desrt.dconf
  - --filesystem=xdg-run/dconf
  # Required to set and trigger GNOME global media keys
  - --talk-name=org.gnome.settings-daemon.plugins.media-keys
  # DBus notifications
  - --talk-name=org.freedesktop.Notifications
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/clippy/cargo
modules:
  - name: clippy
    buildsystem: simple
    build-commands:
      # Flatpak builds run offline on Flathub, using the pre-fetched cargo sources
      - cargo --offline build --release --verbose
      # Install binary
      - install -Dm755 target/release/clippy /app/bin/clippy
      # Install desktop launcher
      - install -Dm644 io.github.CharanMunur.Clippy.desktop /app/share/applications/io.github.CharanMunur.Clippy.desktop
      # Install AppStream metadata
      - install -Dm644 io.github.CharanMunur.Clippy.metainfo.xml /app/share/metainfo/io.github.CharanMunur.Clippy.metainfo.xml
      # Install app icon
      - install -Dm644 assets/clippy.png /app/share/icons/hicolor/256x256/apps/io.github.CharanMunur.Clippy.png
      # Install custom symbolic icons
      - install -Dm644 icons/hicolor/scalable/actions/clippy-pin-symbolic.svg /app/share/icons/hicolor/scalable/actions/clippy-pin-symbolic.svg
      - install -Dm644 icons/hicolor/scalable/actions/clippy-pin-active-symbolic.svg /app/share/icons/hicolor/scalable/actions/clippy-pin-active-symbolic.svg
    sources:
      - type: git
        url: https://github.com/CharanMunur/Clippy.git
        tag: v0.1.0
      # Cargo sources (downloaded offline) will be appended here by the flathub builder
      - cargo-sources.json
